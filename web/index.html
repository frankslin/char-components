<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>漢字部件檢索</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
<header>
  <h1>漢字部件檢索</h1>
  <p class="subtitle">努力做成全互聯網最好用的漢字部件、拆分檢索工具。</p>
</header>

<div class="layout">
  <main class="main">
    <div class="input-row">
      <div class="input-wrap">
        <input id="input" type="text" placeholder="輸入部件，如「日月」；可打「三點水」等部首名" autocomplete="off">
        <button id="clear" type="button" class="input-clear" title="清除">✕</button>
        <div class="suggest" id="suggest" hidden></div>
      </div>
      <button id="search" type="button" class="btn-primary">查詢</button>
    </div>

    <div class="options">
      <label><input id="opt-live" type="checkbox" checked> 即時查詢</label>
      <label><input id="opt-variant" type="checkbox" checked> 包容異體</label>
      <label><input id="opt-subdivide" type="checkbox" checked> 同字異拆</label>
      <label><input id="opt-ucodeonly" type="checkbox"> 排除未編碼補充字</label>
    </div>

    <div class="result-meta">
      <span id="status"></span>
      <span id="counter"></span>
    </div>
    <div id="output"></div>

    <div class="legend-wrap">
      <span class="legend-title">字源顏色圖例</span>
      <div class="legend" id="legend"></div>
      <p class="legend-note">查詢結果的底色代表該字的字源（Unicode 區塊），滑過圖例可看各區說明。A~J 只是擴充區的批次順序，每批都混合中日韓越各方提交的罕用字——越後面的區收錄越晚、字越罕見；「相容」區的重複碼位預設不列出。</p>
    </div>
  </main>

  <aside class="side-panel" id="side-panel" data-view="keypad">
    <div class="side-panel-header">
      <div class="side-panel-tabs" role="tablist">
        <button class="side-tab active" id="side-tab-keypad" type="button" role="tab" aria-selected="true">部件鍵盤</button>
        <button class="side-tab" id="side-tab-detail" type="button" role="tab" aria-selected="false">字詳情</button>
      </div>
      <button id="toggle-panel" type="button" class="btn-ghost" title="收起/展開">收起</button>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="keypad" id="keypad">
        <div class="keypad-grid" id="keypad-grid"></div>
      </div>
      <div class="char-detail" id="char-detail">
        <p class="char-detail-empty">點擊任一個查詢結果查看詳情</p>
      </div>
    </div>
  </aside>
</div>

<footer>
  用漢字部件組合查找生僻字，資料與演算法沿用原作者 WFG 的「拆分樹比對法」。
  資料來源：<a href="https://fgwang.blogspot.com/2015/12/blog-post_30.html" target="_blank" rel="noopener">部件檢索</a>
  （原作者 WFG）。字型：<a href="https://fgwang.blogspot.com/2025/09/unicode-17.html" target="_blank" rel="noopener">全宋體</a>，僅限非商業用途。
  詳見 <a href="https://github.com/frankslin/char-components/tree/main/doc" target="_blank" rel="noopener">doc/</a>
  與 <a href="https://github.com/frankslin/char-components/blob/main/web/README.md" target="_blank" rel="noopener">web/README.md</a>。
</footer>
</div>

<div id="tooltip"></div>
<div id="toast"></div>
<script type="module" src="app.js"></script>
</body>
</html>
